apiVersion: apps/v1
kind: Deployment
metadata:
  name: picfoto-app
  namespace: picfoto
spec:
  replicas: 3
  selector:
    matchLabels:
      app: picfoto
  template:
    metadata:
      labels:
        app: picfoto
    spec:
      containers:
        - name: app
          image: picfoto-photobooks:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: picfoto-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: picfoto-app
  namespace: picfoto
spec:
  selector:
    app: picfoto
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: picfoto-app
  namespace: picfoto
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: app.picfoto.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: picfoto-app
                port:
                  number: 80
  tls:
    - hosts:
        - app.picfoto.com
      secretName: picfoto-tls
